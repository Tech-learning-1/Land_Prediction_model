name: Building the container for Model

on:
  push:
    branches: ["main"]

jobs:
  docker:
    name: build container
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: docker build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/landpred:latest .

      - name: docker push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/landpred:latest